title: Krishnapriya PS
description: >
  Musings on technology, design, startups, books, and the occasional pasta-fuelled adventure.
baseurl: "/krishnapriya"
url: "https://pastapredator.github.io"

author:
  fullname: Krishnapriya PS
  tagline: Product thinker. Startup builder. Pasta devotee.
  github: pastapredator
  linkedin: krishnapriyaps
  email: kpotagan@uwaterloo.ca

# Blog settings
paginate: 9
paginate_path: "/blog/page:num/"

# Collections
collections:
  books:
    output: true
    permalink: /books/:name/
  projects:
    output: true
    permalink: /portfolio/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      pinned: false
  - scope:
      path: ""
      type: "books"
    values:
      layout: "book"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Build
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
